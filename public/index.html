<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渡邊カンパニー 秘書室</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 { font-size: 16px; font-weight: 600; }
    header p { font-size: 11px; color: #666; }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-left: auto;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 6px;
      font-weight: 500;
    }

    .badge.saved { background: #14532d; color: #4ade80; }
    .badge.calendar { background: #1e3a5f; color: #60a5fa; }
    .badge.queued { background: #3b1f1f; color: #f87171; }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 6px; height: 6px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 12px 16px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      padding: 10px 16px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #555; }

    button {
      width: 40px; height: 40px;
      background: #6366f1;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #5558e8; }
    button:active { transform: scale(0.95); }
    button:disabled { background: #3a3a3a; cursor: not-allowed; }

    button svg { width: 18px; height: 18px; fill: white; }

    .welcome {
      text-align: center;
      color: #444;
      font-size: 13px;
      margin: auto;
      padding: 40px 20px;
    }

    .welcome .icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 18px; color: #666; margin-bottom: 8px; }
    .welcome p { line-height: 1.8; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover { border-color: #6366f1; color: #a5b4fc; }
  </style>
</head>
<body>
  <header>
    <div class="avatar">秘</div>
    <div>
      <h1>渡邊カンパニー 秘書室</h1>
      <p>AIエージェント</p>
    </div>
    <div class="status-dot"></div>
  </header>

  <div id="messages">
    <div class="welcome">
      <div class="icon">🏢</div>
      <h2>おはようございます</h2>
      <p>何でもお申し付けください。<br>各部署に指示を出して処理します。</p>
      <div class="suggestions">
        <div class="suggestion" onclick="suggest(this)">アイデアを保存</div>
        <div class="suggestion" onclick="suggest(this)">カレンダーに追加</div>
        <div class="suggestion" onclick="suggest(this)">メモを残して</div>
        <div class="suggestion" onclick="suggest(this)">市場調査して</div>
        <div class="suggestion" onclick="suggest(this)">今日のタスクは？</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="指示を入力..." rows="1"></textarea>
    <button id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('sendBtn');
    let isFirstMessage = true;

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    function suggest(el) {
      input.value = el.textContent;
      input.focus();
    }

    function addMessage(role, text, badge) {
      if (isFirstMessage) {
        document.querySelector('.welcome')?.remove();
        isFirstMessage = false;
      }

      const div = document.createElement('div');
      div.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);

      if (badge) {
        const b = document.createElement('span');
        b.className = `badge ${badge.type}`;
        b.textContent = badge.label;
        div.appendChild(b);
      }

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      div.appendChild(meta);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    async function send() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        removeTyping();

        let badge = null;
        if (data.action === 'saved') badge = { type: 'saved', label: '✓ Obsidianに保存' };
        else if (data.action === 'calendar') badge = { type: 'calendar', label: '✓ カレンダーに登録' };
        else if (data.action === 'queued') badge = { type: 'queued', label: '⏳ 次回起動時に処理' };

        addMessage('assistant', data.reply, badge);
      } catch (e) {
        removeTyping();
        addMessage('assistant', '申し訳ありません。接続エラーが発生しました。');
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
