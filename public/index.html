<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="秘書室">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>渡邊カンパニー 秘書室</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #080808;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: #0f0f0f;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .avatar {
      width: 34px; height: 34px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
    header p  { font-size: 11px; color: #555; margin-top: 1px; }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 7px; height: 7px;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.4;
    }

    #notifBtn {
      background: none;
      border: 1px solid #242424;
      border-radius: 8px;
      color: #555;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: border-color 0.15s, color 0.15s;
    }

    #notifBtn:hover { border-color: #444; color: #aaa; }
    #notifBtn.active { border-color: #666; color: #e0e0e0; background: #1a1a1a; }

    #badgeCount {
      position: absolute;
      top: -5px; right: -5px;
      background: #ffffff;
      color: #080808;
      font-size: 9px;
      font-weight: 700;
      width: 15px; height: 15px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      padding-bottom: calc(110px + max(12px, env(safe-area-inset-bottom)));
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .message.user      { align-self: flex-end;   align-items: flex-end; }
    .message.assistant { align-self: flex-start;  align-items: flex-start; }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .assistant-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #2a2a2a;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #f0f0f0;
      color: #0a0a0a;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #141414;
      border: 1px solid #202020;
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      font-size: 10px;
      color: #404040;
      margin-top: 5px;
      padding: 0 4px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 6px;
      margin-top: 6px;
      font-weight: 500;
      border: 1px solid #272727;
      background: #111111;
      color: #777777;
      letter-spacing: 0.02em;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #141414;
      border: 1px solid #202020;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 5px; height: 5px;
      background: #444;
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .templates {
      display: flex;
      gap: 7px;
      padding: 8px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .templates::-webkit-scrollbar { display: none; }

    .tpl {
      flex-shrink: 0;
      background: #111111;
      border: 1px solid #222222;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .tpl:hover { border-color: #3a3a3a; color: #aaa; }
    .tpl:active { background: #1a1a1a; }

    /* 議事録モーダル */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 85dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 15px; color: #ccc; }
    .modal-close {
      background: none; border: none;
      color: #555; font-size: 20px; cursor: pointer;
    }
    .modal-close:hover { color: #aaa; }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label {
      display: block; font-size: 12px;
      color: #666; margin-bottom: 6px;
    }
    .modal-field input,
    .modal-field textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-field input:focus,
    .modal-field textarea:focus { border-color: #444; }
    .modal-field textarea {
      min-height: 200px;
      resize: vertical;
    }
    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-btn {
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      transition: all 0.15s;
    }
    .modal-btn:hover { border-color: #555; color: #ccc; }
    .modal-btn.primary {
      background: #222;
      border-color: #444;
      color: #e0e0e0;
    }
    .modal-btn.primary:hover { background: #2a2a2a; }
    .modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 16px 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #0f0f0f;
      border-top: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #141414;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 10px 15px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #444444; }
    textarea::placeholder { color: #3a3a3a; }

    #sendBtn {
      width: 38px; height: 38px;
      background: #ffffff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #sendBtn:hover   { background: #d8d8d8; }
    #sendBtn:active  { transform: scale(0.94); }
    #sendBtn:disabled { background: #1e1e1e; cursor: not-allowed; }
    #sendBtn svg { width: 16px; height: 16px; fill: #080808; }
    #sendBtn:disabled svg { fill: #444; }

    .welcome {
      text-align: center;
      color: #3a3a3a;
      font-size: 13px;
      margin: auto;
      padding: 48px 24px;
    }

    .welcome svg { margin-bottom: 20px; opacity: 0.7; }
    .welcome h2 { font-size: 17px; color: #555; margin-bottom: 8px; font-weight: 500; }
    .welcome p  { line-height: 1.9; color: #3a3a3a; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      margin-top: 22px;
    }

    .suggestion {
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 7px 13px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .suggestion:hover { border-color: #3a3a3a; color: #aaa; }

    #installBanner {
      display: none;
      background: #0f0f0f;
      border-bottom: 1px solid #1e1e1e;
      padding: 10px 16px;
      font-size: 12px;
      color: #555;
      align-items: center;
      gap: 10px;
    }

    #installBanner button {
      margin-left: auto;
      background: #ffffff;
      border: none;
      border-radius: 7px;
      color: #080808;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: auto; height: auto;
    }

    #dismissInstall {
      background: none !important;
      color: #333 !important;
      padding: 4px !important;
      font-size: 16px !important;
      font-weight: 400 !important;
      line-height: 1;
    }

    .btn-dashboard {
      background: none;
      border: 1px solid #242424;
      color: #555;
      font-size: 16px;
      width: 34px; height: 34px;
      border-radius: 8px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-dashboard:hover { color: #aaa; border-color: #444; }

    #chitchatToggle {
      background: none;
      border: 1px solid #242424;
      border-radius: 8px;
      color: #555;
      font-size: 16px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: border-color 0.2s, color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    #chitchatToggle:hover { border-color: #444; color: #aaa; }
    #chitchatToggle.active {
      border-color: #6c5ce7;
      color: #a29bfe;
      background: rgba(108, 92, 231, 0.1);
      box-shadow: 0 0 8px rgba(108, 92, 231, 0.15);
    }
    #chitchatToggle .mode-label {
      position: absolute;
      top: -6px; right: -6px;
      background: #6c5ce7;
      color: #fff;
      font-size: 7px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 4px;
      display: none;
      letter-spacing: 0.03em;
    }
    #chitchatToggle.active .mode-label { display: block; }

    /* ── タスクリスト ── */
    .task-list {
      background: #141414;
      border: 1px solid #202020;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 14px;
      min-width: 220px;
      max-width: 300px;
    }

    .task-list-header {
      font-size: 11px;
      color: #555;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .task-list-count {
      margin-left: auto;
      background: #1a1a1a;
      border: 1px solid #272727;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      color: #555;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
    }

    .task-item:last-child { border-bottom: none; }

    .task-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 17px;
      height: 17px;
      border: 1.5px solid #3a3a3a;
      border-radius: 4px;
      flex-shrink: 0;
      cursor: pointer;
      margin-top: 1px;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
      background: transparent;
    }

    .task-item input[type="checkbox"]:checked {
      background: #2a2a2a;
      border-color: #555;
    }

    .task-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 1.5px solid #aaa;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-item-text {
      font-size: 13px;
      line-height: 1.5;
      color: #d0d0d0;
      flex: 1;
      word-break: break-word;
    }

    .task-item-text.done {
      text-decoration: line-through;
      color: #3a3a3a;
    }

    .task-item.loading { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>
  <header>
    <div class="avatar">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="8"  x2="50" y2="26" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <line x1="74" y1="50" x2="92" y2="50" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <line x1="50" y1="74" x2="50" y2="92" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <line x1="8"  y1="50" x2="26" y2="50" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <polygon points="50,26 74,50 50,74 26,50" fill="#ffffff"/>
        <polygon points="50,39 61,50 50,61 39,50" fill="#1a1a1a"/>
        <circle cx="50" cy="50" r="6" fill="#ffffff"/>
      </svg>
    </div>
    <div>
      <h1>渡邊カンパニー 秘書室</h1>
      <p>AIエージェント</p>
    </div>
    <div class="header-actions">
      <button id="chitchatToggle" onclick="toggleChitchatMode()" title="雑談モード">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          <circle cx="9" cy="10" r="1" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="10" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <span class="mode-label">ON</span>
      </button>
      <a href="/dashboard.html" class="btn-dashboard" title="タスクダッシュボード">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </a>
      <button id="notifBtn" onclick="toggleNotifications()" title="通知設定">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div id="badgeCount"></div>
      </button>
      <div class="status-dot"></div>
    </div>
  </header>

  <div id="installBanner">
    ホーム画面に追加するとアプリとして使えます
    <button onclick="installApp()">追加</button>
    <button id="dismissInstall" onclick="dismissInstall()">✕</button>
  </div>

  <div id="messages">
    <div class="welcome">
      <svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="4"  x2="50" y2="22" stroke="#888" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="78" y1="50" x2="96" y2="50" stroke="#888" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="50" y1="78" x2="50" y2="96" stroke="#888" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="4"  y1="50" x2="22" y2="50" stroke="#888" stroke-width="4.5" stroke-linecap="round"/>
        <polygon points="50,22 78,50 50,78 22,50" fill="#888888"/>
        <polygon points="50,38 62,50 50,62 38,50" fill="#080808"/>
        <circle cx="50" cy="50" r="7" fill="#888888"/>
      </svg>
      <h2>…何か用？</h2>
      <p>そうねぇ…何でも言って。<br>やっておくわ。</p>
      <div class="suggestions">
        <div class="suggestion" onclick="suggest(this)">アイデアを保存</div>
        <div class="suggestion" onclick="suggest(this)">カレンダーに追加</div>
        <div class="suggestion" onclick="suggest(this)">メモを残して</div>
        <div class="suggestion" onclick="suggest(this)">市場調査して</div>
        <div class="suggestion" onclick="suggest(this)">今日の予定は？</div>
        <div class="suggestion" onclick="suggest(this)">雑談して</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="templates">
      <div class="tpl" onclick="useTemplate(this)">アイデアを保存</div>
      <div class="tpl" onclick="useTemplate(this)">タスクを追加</div>
      <div class="tpl" onclick="useTemplate(this)">カレンダーに追加</div>
      <div class="tpl" onclick="useTemplate(this)">メモを残して</div>
      <div class="tpl" onclick="useTemplate(this)">市場調査して</div>
      <div class="tpl" onclick="useTemplate(this)">今日の予定は？</div>
      <div class="tpl" onclick="useTemplate(this)">雑談して</div>
      <div class="tpl" onclick="openMinutesModal()">議事録</div>
      <div class="tpl" onclick="openWeeklyModal()">週報提出</div>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="指示を入力（Shift+Enterで送信）..." rows="1"></textarea>
      <button id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- 議事録モーダル -->
  <div class="modal-overlay" id="minutesModal">
    <div class="modal">
      <div class="modal-header">
        <h3>📝 議事録を登録</h3>
        <button class="modal-close" onclick="closeMinutesModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label>タイトル</label>
          <input type="text" id="minutesTitle" placeholder="例: バリューコミュニケーションズ商談 3/18">
        </div>
        <div class="modal-field">
          <label>内容（文字起こしテキストを貼り付け）</label>
          <textarea id="minutesContent" placeholder="録音の文字起こしテキストをここに貼り付けてください..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" onclick="closeMinutesModal()">キャンセル</button>
        <button class="modal-btn primary" id="minutesSendBtn" onclick="sendMinutes()">送信</button>
      </div>
    </div>
  </div>

  <!-- 週報モーダル -->
  <div class="modal-overlay" id="weeklyModal">
    <div class="modal">
      <div class="modal-header">
        <h3>📊 週報を提出</h3>
        <button class="modal-close" onclick="closeWeeklyModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label>対象週（自動入力）</label>
          <input type="text" id="weeklyWeek" readonly>
        </div>
        <div class="modal-field">
          <label>会議内容（文字起こし・要約テキストを貼り付け）</label>
          <textarea id="weeklyContent" placeholder="音声の文字起こし・要約テキストをここに貼り付けてください...&#10;&#10;■ 各自の行動と結果&#10;■ 変更点・改善点&#10;■ イベント状況&#10;■ スタッフの状況&#10;■ 営業関連"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" onclick="closeWeeklyModal()">キャンセル</button>
        <button class="modal-btn primary" id="weeklySendBtn" onclick="sendWeekly()">提出</button>
      </div>
    </div>
  </div>

  <script>
    const input   = document.getElementById('input');
    const messages = document.getElementById('messages');
    const sendBtn  = document.getElementById('sendBtn');
    let isFirstMessage = true;
    let badgeCount = 0;
    let deferredPrompt = null;
    let swRegistration = null;
    let chitchatMode = false;
    let chitchatMessages = [];

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        swRegistration = reg;
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('installDismissed')) {
        document.getElementById('installBanner').style.display = 'flex';
      }
    });

    async function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    }

    function dismissInstall() {
      localStorage.setItem('installDismissed', '1');
      document.getElementById('installBanner').style.display = 'none';
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) clearBadge();
    });

    function clearBadge() {
      badgeCount = 0;
      document.getElementById('badgeCount').style.display = 'none';
      if ('clearAppBadge' in navigator) navigator.clearAppBadge();
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_BADGE' });
      }
    }

    function incrementBadge() {
      badgeCount++;
      const el = document.getElementById('badgeCount');
      el.textContent = badgeCount;
      el.style.display = 'flex';
      if ('setAppBadge' in navigator) navigator.setAppBadge(badgeCount);
    }

    async function toggleNotifications() {
      const btn = document.getElementById('notifBtn');
      if (!('Notification' in window) || !swRegistration) {
        alert('このブラウザはPush通知に対応していません');
        return;
      }
      if (Notification.permission === 'granted') {
        const sub = await swRegistration.pushManager.getSubscription();
        if (sub) await sub.unsubscribe();
        btn.classList.remove('active');
        btn.title = '通知をオンにする';
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        alert('通知が許可されませんでした');
        return;
      }
      await subscribePush();
    }

    async function subscribePush() {
      const btn = document.getElementById('notifBtn');
      try {
        const res = await fetch('/api/vapid-public-key');
        const { publicKey } = await res.json();
        const sub = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey)
        });
        await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub)
        });
        btn.classList.add('active');
        btn.title = '通知をオフにする';
      } catch (err) {
        console.error('Push登録エラー:', err);
        alert('通知の設定に失敗しました');
      }
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
    }

    async function checkNotificationStatus() {
      if (!('Notification' in window) || !swRegistration) return;
      if (Notification.permission === 'granted') {
        const sub = await swRegistration.pushManager.getSubscription();
        if (sub) document.getElementById('notifBtn').classList.add('active');
      }
    }
    setTimeout(checkNotificationStatus, 1000);

    function toggleChitchatMode() {
      const btn = document.getElementById('chitchatToggle');
      if (chitchatMode) {
        chitchatMode = false;
        btn.classList.remove('active');
        input.placeholder = '指示を入力（Shift+Enterで送信）...';
        if (chitchatMessages.length > 0) {
          saveChitchatHistory();
        }
      } else {
        chitchatMode = true;
        btn.classList.add('active');
        chitchatMessages = [];
        input.placeholder = '雑談モード — 気軽に話しかけて...';
      }
    }

    async function saveChitchatHistory() {
      if (chitchatMessages.length === 0) return;
      const log = chitchatMessages.map(m =>
        `**${m.role === 'user' ? 'カメレオン' : 'フリーレン'}**: ${m.text}`
      ).join('\n\n');
      try {
        await fetch('/api/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `雑談ログ保存:\n${log}`, chitchat: true })
        });
      } catch {}
      chitchatMessages = [];
    }

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.shiftKey || e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        send();
      }
    });

    function suggest(el) {
      input.value = el.textContent;
      input.focus();
    }

    function useTemplate(el) {
      const map = {
        'アイデアを保存': 'アイデア ',
        'タスクを追加': 'タスクを追加 ',
        'カレンダーに追加': 'カレンダーに追加 ',
        'メモを残して': 'メモ ',
        '市場調査して': '市場調査 ',
        '今日の予定は？': '今日の予定を教えて',
        '雑談して': '雑談して ',
      };
      const val = map[el.textContent] || el.textContent;
      input.value = val;
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }

    function openMinutesModal() {
      document.getElementById('minutesModal').classList.add('active');
      document.getElementById('minutesTitle').value = '';
      document.getElementById('minutesContent').value = '';
      document.getElementById('minutesTitle').focus();
    }

    function closeMinutesModal() {
      document.getElementById('minutesModal').classList.remove('active');
    }

    function openWeeklyModal() {
      document.getElementById('weeklyModal').classList.add('active');
      // 今週のISO週番号を自動計算
      const now = new Date();
      const jan1 = new Date(now.getFullYear(), 0, 1);
      const days = Math.floor((now - jan1) / 86400000);
      const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
      const weekStr = `${now.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
      // 週の月曜〜日曜を計算
      const day = now.getDay() || 7;
      const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
      document.getElementById('weeklyWeek').value = `${weekStr}（${fmt(mon)}〜${fmt(sun)}）`;
      document.getElementById('weeklyContent').value = '';
      document.getElementById('weeklyContent').focus();
    }

    function closeWeeklyModal() {
      document.getElementById('weeklyModal').classList.remove('active');
    }

    async function sendWeekly() {
      const week = document.getElementById('weeklyWeek').value.trim();
      const content = document.getElementById('weeklyContent').value.trim();
      if (!content) return;

      const btn = document.getElementById('weeklySendBtn');
      btn.disabled = true;
      btn.textContent = '提出中...';

      closeWeeklyModal();
      addMessage('user', `📊 週報提出: ${week}`);
      showTyping();

      try {
        const res = await fetch('/api/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `週報 ${week}\n\n${content}`, weekly: true, weeklyTitle: week })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let fullText = '';
        let bubbleEl = null;
        let divEl = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.text) {
                fullText += data.text;
                if (!bubbleEl) {
                  hideTyping();
                  bubbleEl = addMessage('assistant', '');
                  divEl = bubbleEl.querySelector('div');
                }
                divEl.innerHTML = marked.parse(fullText);
              }
              if (data.done) hideTyping();
            } catch {}
          }
        }
        if (!bubbleEl) { hideTyping(); addMessage('assistant', fullText || '週報を受け付けたよ。'); }
      } catch (e) {
        hideTyping();
        addMessage('assistant', '…エラーが発生したわ。もう一度試してみて。');
      } finally {
        btn.disabled = false;
        btn.textContent = '提出';
      }
    }

    async function sendMinutes() {
      const title = document.getElementById('minutesTitle').value.trim();
      const content = document.getElementById('minutesContent').value.trim();
      if (!title || !content) return;

      const btn = document.getElementById('minutesSendBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      closeMinutesModal();
      addMessage('user', `📝 議事録: ${title}`);
      showTyping();

      try {
        const res = await fetch('/api/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `議事録 ${title}\n\n${content}`, minutes: true, minutesTitle: title })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let fullText = '';
        let bubbleEl = null;
        let divEl = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));
            if (data.text) {
              if (!bubbleEl) {
                removeTyping();
                const m = addMessage('assistant', '', null);
                bubbleEl = m.bubble;
                divEl = m.div;
              }
              fullText += data.text;
              bubbleEl.textContent = fullText;
              messages.scrollTop = messages.scrollHeight;
            }
            if (data.done) {
              removeTyping();
              if (!bubbleEl) addMessage('assistant', fullText || '…キューに追加したわ。', badgeLabel(data.action));
              else if (data.action) {
                const b = document.createElement('span');
                b.className = 'badge';
                b.textContent = badgeLabel(data.action) || '';
                if (b.textContent) divEl.appendChild(b);
              }
            }
          }
        }
      } catch (err) {
        removeTyping();
        addMessage('assistant', '…通信エラーね。もう一度試して。');
      }

      btn.disabled = false;
      btn.textContent = '送信';
    }

    function addMessage(role, text, badgeLabel) {
      if (isFirstMessage) {
        document.querySelector('.welcome')?.remove();
        isFirstMessage = false;
      }

      const div = document.createElement('div');
      div.className = `message ${role}`;

      if (role === 'assistant') {
        const row = document.createElement('div');
        row.className = 'message-row';

        const icon = document.createElement('img');
        icon.src = '/frieren.jpg';
        icon.className = 'assistant-icon';
        icon.alt = 'フリーレン';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;

        row.appendChild(icon);
        row.appendChild(bubble);
        div.appendChild(row);

        if (badgeLabel) {
          const b = document.createElement('span');
          b.className = 'badge';
          b.textContent = badgeLabel;
          b.style.marginLeft = '40px';
          div.appendChild(b);
        }
      } else {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        div.appendChild(bubble);

        if (badgeLabel) {
          const b = document.createElement('span');
          b.className = 'badge';
          b.textContent = badgeLabel;
          div.appendChild(b);
        }
      }

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      if (role === 'assistant') meta.style.marginLeft = '40px';
      div.appendChild(meta);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (role === 'assistant' && document.hidden) incrementBadge();
      return { div, bubble: div.querySelector('.bubble'), meta };
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    function badgeLabel(action) {
      if (action === 'saved')      return '✓  Obsidianに保存';
      if (action === 'calendar')   return '✓  カレンダーに登録';
      if (action === 'queued')     return '⏳  Claude Code起動時に処理';
      if (action === 'researched') return '✓  リサーチ完了・保存済み';
      if (action === 'task_added') return '✓  TODOに追加';
      return null;
    }

    function renderTaskList(tasks, date) {
      const pending = tasks.filter(t => !t.completed);
      const done    = tasks.filter(t => t.completed);

      const wrap = document.createElement('div');
      wrap.className = 'task-list';

      const header = document.createElement('div');
      header.className = 'task-list-header';
      header.innerHTML = '📋 今日のタスク';
      const counter = document.createElement('span');
      counter.className = 'task-list-count';
      counter.textContent = `${done.length} / ${tasks.length} 完了`;
      header.appendChild(counter);
      wrap.appendChild(header);

      // タスク行を生成（未完了→完了の順）
      const ordered = [...pending, ...done];
      for (const task of ordered) {
        const row = document.createElement('label');
        row.className = 'task-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.completed;

        const label = document.createElement('span');
        label.className = 'task-item-text' + (task.completed ? ' done' : '');
        // タスクテキストから "| 優先度: ..." 以降を除いて表示
        label.textContent = task.text.replace(/\s*\|.*$/, '').trim();

        // currentLine はトグル後に更新するためlet
        let currentLine = task.line;

        cb.addEventListener('change', async () => {
          row.classList.add('loading');
          try {
            const res = await fetch('/api/task-toggle', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ date, taskLine: currentLine })
            });
            const data = await res.json();
            if (data.ok) {
              currentLine = data.newLine;
              label.classList.toggle('done', data.completed);
              cb.checked = data.completed;
              // カウンター更新
              const checked = wrap.querySelectorAll('input[type="checkbox"]:checked').length;
              counter.textContent = `${checked} / ${tasks.length} 完了`;
            } else {
              cb.checked = !cb.checked; // revert
            }
          } catch {
            cb.checked = !cb.checked; // revert on error
          }
          row.classList.remove('loading');
        });

        row.appendChild(cb);
        row.appendChild(label);
        wrap.appendChild(row);
      }

      return wrap;
    }

    async function send() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      // 「雑談して」で自動的に雑談モードON
      if (/^雑談(して|しよ|しよう|したい)/.test(text) && !chitchatMode) {
        chitchatMode = true;
        document.getElementById('chitchatToggle').classList.add('active');
        chitchatMessages = [];
        input.placeholder = '雑談モード — 気軽に話しかけて...';
      }

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      showTyping();

      try {
        await sendStreaming(text);
      } catch (e) {
        console.error('Stream failed, falling back:', e);
        try {
          await sendFallback(text);
        } catch {
          removeTyping();
          addMessage('assistant', '申し訳ありません。接続エラーが発生しました。');
        }
      }

      sendBtn.disabled = false;
      input.focus();
    }

    async function sendStreaming(text) {
      const payload = { message: text };
      if (chitchatMode) payload.chitchat = true;
      if (chitchatMode) chitchatMessages.push({ role: 'user', text });

      const res = await fetch('/api/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let fullText = '';
      let bubbleEl = null;
      let divEl = null;
      let metaEl = null;
      let started = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          if (event.tasks) {
            removeTyping();
            if (isFirstMessage) {
              document.querySelector('.welcome')?.remove();
              isFirstMessage = false;
            }
            divEl = document.createElement('div');
            divEl.className = 'message assistant';

            const rowEl = document.createElement('div');
            rowEl.className = 'message-row';

            const iconEl = document.createElement('img');
            iconEl.src = '/frieren.jpg';
            iconEl.className = 'assistant-icon';
            iconEl.alt = 'フリーレン';

            rowEl.appendChild(iconEl);
            rowEl.appendChild(renderTaskList(event.tasks, event.date));
            divEl.appendChild(rowEl);

            metaEl = document.createElement('div');
            metaEl.className = 'message-meta';
            metaEl.style.marginLeft = '40px';
            metaEl.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            divEl.appendChild(metaEl);

            messages.appendChild(divEl);
            messages.scrollTop = messages.scrollHeight;
            started = true;
          }

          if (event.text) {
            if (!started) {
              removeTyping();
              // Create assistant bubble with icon
              if (isFirstMessage) {
                document.querySelector('.welcome')?.remove();
                isFirstMessage = false;
              }
              divEl = document.createElement('div');
              divEl.className = 'message assistant';

              const rowEl = document.createElement('div');
              rowEl.className = 'message-row';

              const iconEl = document.createElement('img');
              iconEl.src = '/frieren.jpg';
              iconEl.className = 'assistant-icon';
              iconEl.alt = 'フリーレン';

              bubbleEl = document.createElement('div');
              bubbleEl.className = 'bubble';

              rowEl.appendChild(iconEl);
              rowEl.appendChild(bubbleEl);
              divEl.appendChild(rowEl);

              metaEl = document.createElement('div');
              metaEl.className = 'message-meta';
              metaEl.style.marginLeft = '40px';
              metaEl.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
              divEl.appendChild(metaEl);

              messages.appendChild(divEl);
              started = true;
            }
            fullText += event.text;
            bubbleEl.textContent = fullText;
            messages.scrollTop = messages.scrollHeight;
          }

          if (event.done) {
            if (!started) {
              removeTyping();
              if (!fullText) fullText = '…やっておいた。';
              addMessage('assistant', fullText, badgeLabel(event.action));
            } else {
              const label = badgeLabel(event.action);
              if (label) {
                const b = document.createElement('span');
                b.className = 'badge';
                b.textContent = label;
                b.style.marginLeft = '40px';
                divEl.insertBefore(b, metaEl);
              }
              if (document.hidden) incrementBadge();
            }
            if (chitchatMode && fullText) {
              chitchatMessages.push({ role: 'assistant', text: fullText });
            }
          }
        }
      }
    }

    async function sendFallback(text) {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addMessage('assistant', data.reply, badgeLabel(data.action));
    }
  </script>
</body>
