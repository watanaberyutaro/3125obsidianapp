<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="秘書室">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>渡邊カンパニー 秘書室</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: bold;
    }

    header h1 { font-size: 16px; font-weight: 600; }
    header p { font-size: 11px; color: #666; }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }

    #notifBtn {
      background: none;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #888;
      font-size: 18px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: all 0.2s;
    }

    #notifBtn:hover { border-color: #6366f1; color: #a5b4fc; }
    #notifBtn.active { border-color: #6366f1; color: #6366f1; background: #1e1b4b; }

    #badgeCount {
      position: absolute;
      top: -6px; right: -6px;
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: bold;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 6px;
      font-weight: 500;
    }

    .badge.saved { background: #14532d; color: #4ade80; }
    .badge.calendar { background: #1e3a5f; color: #60a5fa; }
    .badge.queued { background: #3b1f1f; color: #f87171; }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 6px; height: 6px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 20px;
      padding: 10px 16px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #555; }

    #sendBtn {
      width: 40px; height: 40px;
      background: #6366f1;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #sendBtn:hover { background: #5558e8; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { background: #3a3a3a; cursor: not-allowed; }
    #sendBtn svg { width: 18px; height: 18px; fill: white; }

    .welcome {
      text-align: center;
      color: #444;
      font-size: 13px;
      margin: auto;
      padding: 40px 20px;
    }

    .welcome .icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 18px; color: #666; margin-bottom: 8px; }
    .welcome p { line-height: 1.8; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion:hover { border-color: #6366f1; color: #a5b4fc; }

    /* インストールバナー */
    #installBanner {
      display: none;
      background: #1e1b4b;
      border-bottom: 1px solid #3730a3;
      padding: 10px 16px;
      font-size: 13px;
      color: #a5b4fc;
      align-items: center;
      gap: 10px;
    }

    #installBanner button {
      margin-left: auto;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      width: auto; height: auto;
      border-radius: 8px;
    }

    #dismissInstall {
      background: none !important;
      color: #555 !important;
      padding: 4px !important;
      font-size: 18px !important;
      line-height: 1;
    }
  </style>
</head>
<body>
  <header>
    <div class="avatar">秘</div>
    <div>
      <h1>渡邊カンパニー 秘書室</h1>
      <p>AIエージェント</p>
    </div>
    <div class="header-actions">
      <button id="notifBtn" onclick="toggleNotifications()" title="通知設定">
        🔔
        <div id="badgeCount"></div>
      </button>
      <div class="status-dot"></div>
    </div>
  </header>

  <div id="installBanner">
    📲 ホーム画面に追加してアプリとして使えます
    <button onclick="installApp()">追加</button>
    <button id="dismissInstall" onclick="dismissInstall()">✕</button>
  </div>

  <div id="messages">
    <div class="welcome">
      <div class="icon">🏢</div>
      <h2>おはようございます</h2>
      <p>何でもお申し付けください。<br>各部署に指示を出して処理します。</p>
      <div class="suggestions">
        <div class="suggestion" onclick="suggest(this)">アイデアを保存</div>
        <div class="suggestion" onclick="suggest(this)">カレンダーに追加</div>
        <div class="suggestion" onclick="suggest(this)">メモを残して</div>
        <div class="suggestion" onclick="suggest(this)">市場調査して</div>
        <div class="suggestion" onclick="suggest(this)">今日のタスクは？</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="指示を入力（Shift+Enterで送信）..." rows="1"></textarea>
    <button id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('sendBtn');
    let isFirstMessage = true;
    let badgeCount = 0;
    let deferredPrompt = null;
    let swRegistration = null;

    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        swRegistration = reg;
        console.log('SW registered');
      });
    }

    // PWAインストールプロンプト
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('installDismissed')) {
        document.getElementById('installBanner').style.display = 'flex';
      }
    });

    async function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    }

    function dismissInstall() {
      localStorage.setItem('installDismissed', '1');
      document.getElementById('installBanner').style.display = 'none';
    }

    // アプリ開いた時にバッジをクリア
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) clearBadge();
    });

    function clearBadge() {
      badgeCount = 0;
      document.getElementById('badgeCount').style.display = 'none';
      if ('clearAppBadge' in navigator) navigator.clearAppBadge();
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_BADGE' });
      }
    }

    function incrementBadge() {
      badgeCount++;
      const el = document.getElementById('badgeCount');
      el.textContent = badgeCount;
      el.style.display = 'flex';
      if ('setAppBadge' in navigator) navigator.setAppBadge(badgeCount);
    }

    // Push通知の有効化/無効化
    async function toggleNotifications() {
      const btn = document.getElementById('notifBtn');

      if (!('Notification' in window) || !swRegistration) {
        alert('このブラウザはPush通知に対応していません');
        return;
      }

      if (Notification.permission === 'granted') {
        // 既に有効 → 無効化
        const sub = await swRegistration.pushManager.getSubscription();
        if (sub) await sub.unsubscribe();
        btn.classList.remove('active');
        btn.title = '通知をオンにする';
        return;
      }

      // 通知許可を要求
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        alert('通知が許可されませんでした');
        return;
      }

      await subscribePush();
    }

    async function subscribePush() {
      const btn = document.getElementById('notifBtn');
      try {
        // VAPID公開鍵を取得
        const res = await fetch('/api/vapid-public-key');
        const { publicKey } = await res.json();

        const sub = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey)
        });

        // subscriptionをサーバーに送信
        await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub)
        });

        btn.classList.add('active');
        btn.title = '通知をオフにする';
        console.log('Push通知を有効化しました');
      } catch (err) {
        console.error('Push登録エラー:', err);
        alert('通知の設定に失敗しました');
      }
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
    }

    // 通知状態を確認
    async function checkNotificationStatus() {
      if (!('Notification' in window) || !swRegistration) return;
      if (Notification.permission === 'granted') {
        const sub = await swRegistration.pushManager.getSubscription();
        if (sub) document.getElementById('notifBtn').classList.add('active');
      }
    }

    setTimeout(checkNotificationStatus, 1000);

    // チャット機能
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      // Shift+Enter または Ctrl+Enter で送信、Enter単体は改行
      if (e.key === 'Enter' && (e.shiftKey || e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        send();
      }
    });

    function suggest(el) {
      input.value = el.textContent;
      input.focus();
    }

    function addMessage(role, text, badge) {
      if (isFirstMessage) {
        document.querySelector('.welcome')?.remove();
        isFirstMessage = false;
      }

      const div = document.createElement('div');
      div.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);

      if (badge) {
        const b = document.createElement('span');
        b.className = `badge ${badge.type}`;
        b.textContent = badge.label;
        div.appendChild(b);
      }

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      div.appendChild(meta);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      // バックグラウンド時はバッジを増やす
      if (role === 'assistant' && document.hidden) incrementBadge();
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    async function send() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        removeTyping();

        let badge = null;
        if (data.action === 'saved') badge = { type: 'saved', label: '✓ Obsidianに保存' };
        else if (data.action === 'calendar') badge = { type: 'calendar', label: '✓ カレンダーに登録' };
        else if (data.action === 'queued') badge = { type: 'queued', label: '⏳ 次回起動時に処理' };

        addMessage('assistant', data.reply, badge);
      } catch (e) {
        removeTyping();
        addMessage('assistant', '申し訳ありません。接続エラーが発生しました。');
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
